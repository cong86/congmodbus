- name: gree_bms
  type: tcp
  host: 192.168.1.100
  baudrate: 9600
  port: 502
  delay: 1
  timeout: 8
  message_wait_milliseconds: 200

  sensors:
    # ----------------- 10 号 -----------------
    - name: "格力10_模式原始值"
      unique_id: gree_10_mode_raw
      slave: 2
      address: 328
      input_type: holding
      data_type: uint16
      scan_interval: 30

    - name: "格力10_设定温度"
      unique_id: gree_10_target_temp
      slave: 2
      address: 329
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "°C"
      scan_interval: 30

    - name: "格力10_室温"
      unique_id: gree_10_room_temp
      slave: 2
      address: 341
      input_type: holding
      data_type: uint16
      scale: 0.1
      precision: 1
      unit_of_measurement: "°C"
      state_class: measurement
      scan_interval: 30

    - name: "格力10_风速"
      unique_id: gree_10_fan_speed
      slave: 2
      address: 330
      input_type: holding
      data_type: uint16
      scan_interval: 30

